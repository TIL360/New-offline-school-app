<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Leaving Certificate</title>
    <style>
        /* A4 Page Setup */
        @page { size: A4; margin: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f0f0; 
            margin: 0; 
            padding: 0; 
        }

        /* Container for each page (Original and Duplicate) */
        .page {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            margin: 10mm auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            page-break-after: always;
        }

        .certificate-container {
            border: 5px double #000;
            padding: 20px 30px;
            height: 100%;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Watermark */
        .certificate-container::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            background: url('../../assets/img/logo.png') no-repeat center;
            background-size: contain;
            opacity: 0.04;
            z-index: 0;
        }

        .header { text-align: center; position: relative; z-index: 1; margin-bottom: 5px; }
        .school-logo { width: 80px; height: 80px; margin-bottom: 5px; }
        .school-name { font-size: 30px; font-weight: bold; margin: 0; color: #000; }
        .title-box { display: inline-block; border: 2px solid #000; padding: 4px 20px; font-weight: bold; margin: 8px 0; background: #f8fafc; font-size: 18px; }
        
        .status-line { text-align: center; font-size: 22px; font-weight: bold; text-decoration: underline; margin: 5px 0; position: relative; z-index: 1; }
        
        .id-row { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            margin-bottom: 15px; 
            font-size: 15px; 
            position: relative; 
            z-index: 1;
        }

        .content-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px 60px; 
            position: relative; 
            z-index: 1;
        }

        .field-row { display: flex; align-items: flex-end; margin-bottom: 5px; }
        .label { font-size: 14px; font-weight: bold; white-space: nowrap; margin-right: 8px; color: #333; }
        
        .value { 
            flex-grow: 1; 
            border-bottom: 1px solid #000; 
            padding-left: 8px; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: 600; 
            min-height: 18px; 
            font-size: 15px;
        }

        .urdu-text { font-family: serif; text-align: right; font-size: 22px; min-width: 140px; }

        /* Signature area pushed to bottom */
        .footer-signatures { 
            margin-top: auto; 
            display: flex; 
            justify-content: space-between; 
            text-align: center; 
            padding-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .sig-box { width: 160px; }
        .sig-line { border-top: 1px solid #000; margin-bottom: 8px; }

        #printBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 25px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        @media print {
            body { background: none; padding: 0; }
            .page { margin: 0; box-shadow: none; }
            #printBtn { display: none; }
        }
    </style>
</head>
<body>

    <button id="printBtn" onclick="window.print()">Print Certificate</button>

    <!-- Pages will be injected here by JavaScript -->
    <div id="certificate-wrapper"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const regNo = urlParams.get('reg_no');

            if (regNo) {
                try {
                    // Fetch data using the Registration Number
                    const s = await window.api.getStudentByRegNo(regNo.toString());
                    
                    if (s) {
                        const wrapper = document.getElementById('certificate-wrapper');
                        // Render both Original and Duplicate
                        wrapper.innerHTML = renderFullPage('Original', s) + renderFullPage('Duplicate', s);
                    } else {
                        alert("No student found with Registration Number: " + regNo);
                    }
                } catch (err) {
                    console.error("Database Error:", err);
                    alert("Error loading student data.");
                }
            }
        });

        function renderFullPage(type, s) {
            // Logic for dates: use DB value or today's date if null
            const today = new Date().toLocaleDateString('en-GB');
            const leavingDate = s.leaving_date || today;

            return `
            <div class="page">
                <div class="certificate-container">
                    <div class="header">
                        <img src="../../images/logo.png" alt="Logo" class="school-logo">
                        <h1 class="school-name">Your Institute Name</h1>
                        <p style="font-size: 12px; font-style: italic; margin-bottom: 10px;">Affiliated with FBISE - Established-1987</p>
                        <div class="title-box">SCHOOL LEAVING CERTIFICATE</div>
                                            </div>

                    <div class="status-line">${type}</div>

                    <div class="id-row">
                        <div>Admission No: <span style="border-bottom: 1px solid #000; padding: 0 10px;">${s.registration_no || ''}</span></div>
                        <div>Serial No: <span style="border-bottom: 1px solid #000; padding: 0 10px;">${s.certificate_serial || '---'}</span></div>
                    </div>

                    <div class="content-grid">
                        <div class="field-row" style="grid-column: span 2;">
                            <span class="label">Student's Name:</span>
                            <span class="value">${s.student_name || ''}</span>
                            <span class="label" style="margin-left: 10px;">In Urdu:</span>
                            <span class="value urdu-text">${s.student_name_urdu || ''}</span>
                        </div>

                        <div class="field-row" style="grid-column: span 2;">
                            <span class="label">Father's Name:</span>
                            <span class="value">${s.father_name || ''}</span>
                            <span class="label" style="margin-left: 10px;">In Urdu:</span>
                            <span class="value urdu-text">${s.father_name_urdu || ''}</span>
                        </div>

                        <div class="field-row" style="grid-column: span 2;">
                            <span class="label">Date of Birth (In figures):</span>
                            <span class="value">${s.dob || ''}</span>
                            <span class="label" style="margin-left: 10px;">In Words:</span>
                            <span class="value">${s.dob_in_words || ''}</span>
                        </div>

                        <div class="field-row">
                            <span class="label">Class Admitted:</span>
                            <span class="value">${s.admission_class || ''}</span>
                        </div>

                        <div class="field-row">
                            <span class="label">Leaving Date:</span>
                            <span class="value">${leavingDate}</span>
                        </div>

                        <div class="field-row" style="grid-column: span 2;">
                            <span class="label">Class at Leaving:</span>
                            <span class="value">${s.current_class || ''}</span>
                        </div>

                        <div class="field-row">
                            <span class="label">Dues Paid Upto:</span>
                            <span class="value">${s.dues_paid_up_to || 'N/A'}</span>
                        </div>

                        <div class="field-row">
                            <span class="label">Character:</span>
                            <span class="value">${s.character_remarks || 'GOOD'}</span>
                        </div>

                        <div class="field-row" style="grid-column: span 2;">
                            <span class="label">Date of Issuance:</span>
                            <span class="value">${today}</span>
                        </div>
                    </div>

                    <div class="footer-signatures">
                        <div class="sig-box"><div class="sig-line"></div><strong>Office</strong></div>
                        <div class="sig-box"><div class="sig-line"></div><strong>Admission Incharge</strong></div>
                        <div class="sig-box"><div class="sig-line"></div><strong>Principal</strong></div>
                    </div>
                </div>
            </div>`;
        }
    </script>
</body>
</html>
